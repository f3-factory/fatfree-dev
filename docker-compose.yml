x-php-template: &php
  restart: 'always'
  networks:
    internal:
  volumes:
    - ${DOCUMENT_ROOT}:/var/www/html:rw
    - ./docker/config/php/php.ini:/usr/local/etc/php/php.ini
    - ./docker/config/php/docker-php-ext-xdebug3.ini:/usr/local/etc/php/conf.d/docker-php-ext-xdebug.ini
  environment: &php_env
    XDEBUG_MODE: debug
    XDEBUG_CONFIG: client_host=host.docker.internal
    XDEBUG_SESSION: PHPSTORM
networks:
  internal:
services:
  traefik:
    image: "traefik:v3.5"
    container_name: "${COMPOSE_PROJECT_NAME}-traefik"
    command:
      - "--log.level=DEBUG"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:${HOST_PORT_HTTP}"
      - "--entrypoints.websecure.address=:${HOST_PORT_HTTPS}"
      - "--providers.docker.network=internal"
      - "--serversTransport.insecureSkipVerify=true"
    networks:
      - internal
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    ports:
      - "${HOST_PORT_HTTP}:80"
      - "${HOST_PORT_HTTPS}:443"
      - "${HOST_PORT_TRAEFIK}:8080"
  apache24:
    image: httpd:2.4
    container_name: '${COMPOSE_PROJECT_NAME}-apache'
    volumes:
      - ${DOCUMENT_ROOT}:/var/www/html:rw
      - ./docker/config/apache/vhosts:/usr/local/apache2/sites-enabled
      - ./docker/config/apache/httpd.conf:/usr/local/apache2/conf/httpd.conf
      - ./docker/config/apache/selfsigned.crt:/usr/local/apache2/conf/selfsigned.crt
      - ./docker/config/apache/selfsigned.key:/usr/local/apache2/conf/selfsigned.key
      - ./docker/data/logs/apache2:/var/log/apache2
    networks:
      - internal
    labels:
      - traefik.enable=true
#     php 8.4
      - traefik.http.routers.php84.rule=Host(`${COMPOSE_PROJECT_NAME}.php84.localhost`)
      - traefik.http.routers.php84.service=php84
      - traefik.http.services.php84.loadbalancer.server.port=8084
#     php 8.4 ssl
      - traefik.http.routers.php84ssl.rule=Host(`${COMPOSE_PROJECT_NAME}.php84.localhost`)
      - traefik.http.routers.php84ssl.service=php84
      - traefik.http.routers.php84ssl.entrypoints=websecure
      - traefik.http.routers.php84ssl.tls=true
      - traefik.http.services.php84ssl.loadbalancer.server.port=5084
#     php 8.5
      - traefik.http.routers.php85.rule=Host(`${COMPOSE_PROJECT_NAME}.php85.localhost`)
      - traefik.http.routers.php85.service=php85
      - traefik.http.services.php85.loadbalancer.server.port=8085
  nginx:
    image: nginx:latest
    container_name: '${COMPOSE_PROJECT_NAME}-nginx'
    volumes:
      - ${DOCUMENT_ROOT}:/usr/share/nginx/html:rw
      - ./docker/config/nginx/vhosts/default.conf:/etc/nginx/conf.d/default.conf
      - ./docker/config/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/config/nginx/selfsigned.crt:/etc/nginx/selfsigned.crt
      - ./docker/config/nginx/selfsigned.key:/etc/nginx/selfsigned.key
      - ./docker/data/logs/nginx:/var/log/nginx
    networks:
      - internal
    depends_on:
      - php84roadrunner
      - php84swoole
      - php84
    labels:
      - traefik.enable=true
#     php 8.4 + swoole
      - traefik.http.routers.ngx-php84swoole.rule=Host(`${COMPOSE_PROJECT_NAME}.nginx.php84swoole.localhost`)
      - traefik.http.routers.ngx-php84swoole.service=ngx-php84swoole
      - traefik.http.services.ngx-php84swoole.loadbalancer.server.port=8184
#     php 8.4 + roadrunner
      - traefik.http.routers.ngx-php84rr.rule=Host(`${COMPOSE_PROJECT_NAME}.nginx.php84rr.localhost`)
      - traefik.http.routers.ngx-php84rr.service=ngx-php84rr
      - traefik.http.services.ngx-php84rr.loadbalancer.server.port=8284
#     php 8.4
      - traefik.http.routers.ngx-php84.rule=Host(`${COMPOSE_PROJECT_NAME}.nginx.php84.localhost`)
      - traefik.http.routers.ngx-php84.service=php84
      - traefik.http.services.ngx-php84.loadbalancer.server.port=8084
#     php 8.4 + ssl
      - traefik.http.routers.ngx-php84ssl.rule=Host(`${COMPOSE_PROJECT_NAME}.nginx.php84.localhost`)
      - traefik.http.routers.ngx-php84ssl.service=php84
      - traefik.http.routers.ngx-php84ssl.entrypoints=websecure
      - traefik.http.routers.ngx-php84ssl.tls=true
      - traefik.http.services.ngx-php84ssl.loadbalancer.server.port=5084
#     php 8.5
      - traefik.http.routers.ngx-php85.rule=Host(`${COMPOSE_PROJECT_NAME}.nginx.php85.localhost`)
      - traefik.http.routers.ngx-php85.service=php85
      - traefik.http.services.ngx-php85.loadbalancer.server.port=8085

  php84swoole:
    <<: *php
    volumes:
      - ${DOCUMENT_ROOT}:/var/www/html:rw
      - ./docker/config/php/php.ini:/usr/local/etc/php/php.ini
      - ./docker/config/php_swoole/docker-php-ext-xdebug3.ini:/usr/local/etc/php/conf.d/docker-php-ext-xdebug.ini
    build:
      context: ./docker/bin/swoole
    container_name: '${COMPOSE_PROJECT_NAME}-php84swoole'
    hostname: f3-php84swoole
    labels:
      - traefik.enable=true
      - traefik.http.routers.raw-php84swoole.rule=Host(`${COMPOSE_PROJECT_NAME}.php84swoole.localhost`)
      - traefik.http.routers.raw-php84swoole.service=raw-php84swoole
      - traefik.http.services.raw-php84swoole.loadbalancer.server.port=9501
    environment:
      <<: *php_env
      AUTORELOAD_PROGRAMS: "swoole"
      AUTORELOAD_ANY_FILES: 1
      PHP_IDE_CONFIG: serverName=${COMPOSE_PROJECT_NAME}.php84swoole.localhost

  php84openswoole:
    <<: *php
    volumes:
      - ${DOCUMENT_ROOT}:/var/www/html:rw
      - ./docker/config/php/php.ini:/usr/local/etc/php/php.ini
      - ./docker/config/php_swoole/docker-php-ext-xdebug3.ini:/usr/local/etc/php/conf.d/docker-php-ext-xdebug.ini
    build:
      context: ./docker/bin/open-swoole
    container_name: '${COMPOSE_PROJECT_NAME}-php84openswoole'
    hostname: f3-php84openswoole
    labels:
      - traefik.enable=true
      - traefik.http.routers.raw-php84openswoole.rule=Host(`${COMPOSE_PROJECT_NAME}.php84openswoole.localhost`)
      - traefik.http.routers.raw-php84openswoole.service=raw-php84openswoole
      - traefik.http.services.raw-php84openswoole.loadbalancer.server.port=9501
    environment:
      <<: *php_env
      PHP_IDE_CONFIG: serverName=${COMPOSE_PROJECT_NAME}.php84openswoole.localhost

  php84roadrunner:
    <<: *php
    build:
      context: ./docker/bin/php84rr
    container_name: '${COMPOSE_PROJECT_NAME}-php84rr'
    hostname: f3-php84rr
    environment:
      <<: *php_env
      PHP_IDE_CONFIG: serverName=${COMPOSE_PROJECT_NAME}.php84rr.localhost

  php84:
    <<: *php
    build:
      context: ./docker/bin/php84
    container_name: '${COMPOSE_PROJECT_NAME}-php84'
    hostname: f3-php84
    environment:
      <<: *php_env
      PHP_IDE_CONFIG: serverName=${COMPOSE_PROJECT_NAME}.php84.localhost

  php85:
    <<: *php
    build:
      context: ./docker/bin/php85
    container_name: '${COMPOSE_PROJECT_NAME}-php85'
    hostname: f3-php85
    environment:
      <<: *php_env
      PHP_IDE_CONFIG: serverName=${COMPOSE_PROJECT_NAME}.php85.localhost

  composer_install:
    container_name: composer_installation
    image: composer
    volumes:
      - ./:/app
    command: composer install --ignore-platform-reqs

  mysql:
    image: arm64v8/mysql:8.0
    container_name: '${COMPOSE_PROJECT_NAME}-mysql'
    hostname: f3-mysql
    restart: 'always'
    ports:
      - "${HOST_PORT_MYSQL}:${MYSQL_PORT}"
    volumes:
      - ./docker/data/mysql:/var/lib/mysql
      - ./docker/data/logs/mysql:/var/log/mysql
    command: mysqld --general-log=1 --general-log-file=/var/log/mysql/general-log.log
    networks:
      internal:
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}

  mariadb:
    image: mariadb:10.11
    container_name: '${COMPOSE_PROJECT_NAME}-mariadb'
    hostname: f3-mariadb
    restart: 'always'
    ports:
      - "${HOST_PORT_MARIADB}:${MYSQL_PORT}"
    volumes:
      - ./docker/data/mariadb:/var/lib/mysql
      - ./docker/data/logs/mariadb:/var/log/mysql
    command: mysqld --general-log=1 --general-log-file=/var/log/mysql/general-log.log
    networks:
      internal:
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}

  pgsql:
    image: postgres:latest
    container_name: '${COMPOSE_PROJECT_NAME}-pgsql'
    hostname: f3-pgsql
    restart: 'always'
    ports:
      - "${HOST_PORT_PGSQL}:${PGSQL_PORT}"
    networks:
      internal:
    environment:
      POSTGRES_DB: ${PGSQL_DATABASE}
      POSTGRES_USER: ${PGSQL_USER}
      POSTGRES_PASSWORD: ${PGSQL_PASSWORD}

  mssql:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: '${COMPOSE_PROJECT_NAME}-mssql'
    hostname: f3-mssql
    restart: 'always'
    networks:
      internal:
    ports:
      - "${HOST_PORT_MSSQL}:1433"
    environment:
      ACCEPT_EULA: Y
      SA_PASSWORD: FatFree-r00t!
      MSSQL_PID: Developer

  mongo:
    image: mongo
    container_name: '${COMPOSE_PROJECT_NAME}-mongodb'
    hostname: f3-mongodb
    restart: always
    networks:
      internal:
    ports:
      - "${HOST_PORT_MONGO}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD}

  redis:
    container_name: '${COMPOSE_PROJECT_NAME}-redis'
    hostname: f3-redis
    image: redis:latest
    networks:
      internal:
    ports:
      - "${HOST_PORT_REDIS}:6379"

  memcached:
    container_name: '${COMPOSE_PROJECT_NAME}-memcached'
    hostname: f3-memcached
    image: memcached:latest
    networks:
      internal:
