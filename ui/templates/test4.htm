<F3:repeat group="{{ @div }}" key="{{ @ikey }}" value="{{ @idiv }}">
	<div>
		<p><span><b>{{ @ikey }}</b></span></p>
		<p>
			<F3:repeat group="{{ @idiv }}" value="{{ @ispan }}" counter="{{ @ctr }}">
			<span class="{{ (@ctr%2)?'odd':'even' }}">{{ @ispan }}</span>
			</F3:repeat>
		</p>
	</div>
</F3:repeat>
